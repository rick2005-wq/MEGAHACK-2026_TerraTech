version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: grainos
      POSTGRES_PASSWORD: grainos_secret
      POSTGRES_DB: grainos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
