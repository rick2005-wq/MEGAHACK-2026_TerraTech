name: Backend CI
on:
  push:
    branches: [main]
    paths: [backend/**]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: cd backend && npm ci && npm run build
      - name: Build Docker image
        run: docker build -t grainos-backend ./backend
